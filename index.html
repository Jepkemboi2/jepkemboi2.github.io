<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Overlay</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        /* Stock Ticker */
        #stock-ticker {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 300px;
            height: 200px;
        }

        /* Stock Chart Panel */
        #stock-chart {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 400px;
            height: 250px;
        }

        /* Scrolling News */
        #news-ticker {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            background: #ff9800;
            color: black;
            padding: 10px;
            white-space: nowrap;
            overflow: hidden;
            font-weight: bold;
        }

        /* Scrolling animation */
        @keyframes scrollText {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        #news-content {
            display: inline-block;
            animation: scrollText 20s linear infinite;
            will-change: transform;
        }
    </style>
</head>
<body>

    <!-- TradingView Stock Ticker -->
    <div id="stock-ticker"></div>
    <script type="text/javascript">
        new TradingView.widget({
            "container_id": "stock-ticker",
            "symbols": [
                { "proName": "FOREXCOM:NSXUSD", "title": "Nasdaq 100" },
                { "proName": "FOREXCOM:SPXUSD", "title": "S&P 500" },
                { "proName": "FX_IDC:USDKES", "title": "USD/KES" },
                { "proName": "NSE:SCOM", "title": "Safaricom" },
                { "proName": "NSE:KCB", "title": "KCB Bank" }
            ],
            "isTransparent": false,
            "colorTheme": "dark",
            "locale": "en"
        });
    </script>

    <!-- TradingView Chart -->
    <div id="stock-chart"></div>
    <script type="text/javascript">
        new TradingView.widget({
            "container_id": "stock-chart",
            "colorTheme": "dark",
            "dateRange": "12M",
            "showChart": true,
            "locale": "en",
            "largeChartUrl": "",
            "isTransparent": false,
            "showSymbolLogo": true,
            "tabs": [
                {
                    "title": "NSE",
                    "symbols": [
                        { "s": "NSE:SCOM", "d": "Safaricom" },
                        { "s": "NSE:KCB", "d": "KCB Bank" },
                        { "s": "NSE:EABL", "d": "EABL" }
                    ]
                }
            ]
        });
    </script>

    <!-- Scrolling News Ticker -->
    <div id="news-ticker">
        <div id="news-content">📢 Breaking News: Safaricom shares rise 2% | KCB posts record profits | Market reacts to CBK interest rate decision</div>
    </div>

</body>
</html>
