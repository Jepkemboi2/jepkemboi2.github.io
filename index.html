<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS News Ticker</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .ticker {
            width: 100%;
            background: #1e1e1e;
            color: #00ffcc;
            white-space: nowrap;
            overflow: hidden;
            box-shadow: 0px -2px 5px rgba(255, 255, 255, 0.1);
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        .ticker-content {
            display: inline-block;
            padding: 10px;
            animation: ticker-scroll 15s linear infinite;
        }
        @keyframes ticker-scroll {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }
    </style>
</head>
<body>
    <div class="ticker">
        <div class="ticker-content">Breaking News: Market opens with NSE 20 Share Index at 1800 points... | Safaricom shares up 2.5%...</div>
    </div>
</body>
</html>
