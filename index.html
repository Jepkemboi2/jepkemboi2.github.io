<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial News Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 20px;
        }

        .section {
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .ticker-box {
            background: black;
            color: white;
            padding: 20px;
            width: 700px;
            height: 1200px;
            border-radius: 5px;
            text-align: center;
            font-family: Arial, sans-serif;
            position: relative;
        }

        .intraday {
            background: #ffffff;
            color: black;
            font-weight: bold;
            padding: 10px;
            font-size: 50px;
        }

        .index-name {
            background: #ffcc00;
            color: black;
            font-weight: bold;
            padding: 15px;
            margin-bottom: 5px;
            font-size: 60px;
        }

        .index-value {
            font-size: 55px;
            margin-top: 10px;
        }

        .index-change {
            color: red;
            font-size: 50px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="ticker-box">
        <div class="intraday">INTRADAY</div>
        <div id="index-container">
            <div class="index-name"></div>
        </div>
    </div>

    <script>
        const indices = [
            { name: "S&P 500 Index", proName: "FOREXCOM:SPXUSD" },
            { name: "US 100 Cash CFD", proName: "FOREXCOM:NSXUSD" },
            { name: "EUR to USD", proName: "FX_IDC:EURUSD" },
            { name: "Bitcoin", proName: "BITSTAMP:BTCUSD" },
            { name: "Ethereum", proName: "BITSTAMP:ETHUSD" }
        ];

        let currentIndex = 0;

        function updateIndex() {
            const indexData = indices[currentIndex];
            document.querySelector(".index-name").innerText = indexData.name;
            
            const widgetContainer = document.querySelector("#index-container");
            widgetContainer.innerHTML = `<div class='index-name'>${indexData.name}</div>`;
            
            const script = document.createElement("script");
            script.type = "text/javascript";
            script.async = true;
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-tickers.js";
            script.innerHTML = JSON.stringify({
                symbols: [{ proName: indexData.proName, title: "" }],
                isTransparent: true,
                showSymbolLogo: false,
                colorTheme: "dark",
                locale: "en"
            });

            widgetContainer.appendChild(script);

            currentIndex = (currentIndex + 1) % indices.length;
        }

        updateIndex();
        setInterval(updateIndex, 10000);
    </script>
</body>
</html>
