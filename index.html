<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial News Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        .live-video {
            grid-column: span 2;
            position: relative;
        }

        video {
            width: 100%;
            border-radius: 10px;
        }

        .breaking-news {
            position: absolute;
            bottom: 10px;
            left: 0;
            background: red;
            color: white;
            padding: 10px;
            font-weight: bold;
            width: 100%;
            text-align: center;
        }

        .market-overview {
            background: #252525;
            padding: 20px;
            border-radius: 10px;
        }

        .index {
            font-size: 18px;
            font-weight: bold;
        }

        .chart img {
            width: 100%;
            border-radius: 10px;
        }

        .news {
            background: #252525;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            color: #ffa500;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Live Video Section -->
        <div class="live-video">
            <video src="live-stream.mp4" autoplay muted></video>
            <div class="breaking-news">BREAKING NEWS: Powell: US Federal Budget is on an Unsustainable Path</div>
        </div>
        
        <!-- Stock Market Overview -->
        <div class="market-overview">
            <div class="index">Russell 2000 Index: <span class="value">2,277.26</span> <span class="change">▼10.68 (-0.47%)</span></div>
            <div class="chart"><img src="chart.png" alt="Russell 2000 Chart"></div>
        </div>
        
        <!-- News Section -->
        <div class="news">
            <h2>Germany in Talks Over Gas Storage Support as Levels Decline</h2>
            <p>Germany's gas market manager said it's in 'intensive discussions' with authorities about potential subsidies...</p>
        </div>
    </div>
</body>
</html>
